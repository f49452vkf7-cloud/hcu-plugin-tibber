name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (Required for ARM64 Emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export Valid ARM64 OCI Layout
        run: |
          mkdir -p ./oci-export
          docker buildx build \
            --platform linux/arm64 \
            --output type=oci,dest=./oci-export/image.tar .

      - name: Structure Flat Package Bundle
        run: |
          mkdir -p ./hcu-package
          tar -xf ./oci-export/image.tar -C ./hcu-package
          cp manifest.json ./hcu-package/

      - name: Create Spec-Compliant HCU TAR.GZ Bundle
        run: |
          # Isoliertes Packen ohne Systemdateien-Konflikt
          cd ./hcu-package
          tar --format=posix -czf ../hcu-tibber-plugin.tar.gz .

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ./hcu-tibber-plugin.tar.gz --clobber
