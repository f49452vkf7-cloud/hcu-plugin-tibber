name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export OCI Tarball
        run: |
          # Exportiert das Image regelkonform als OCI-konforme TAR-Datei
          docker buildx build --output type=oci,dest=./oci-image.tar .

      - name: Unpack OCI Layout and Structure Package
        run: |
          # Erstellt ein temporäres Verzeichnis und entpackt die OCI-Struktur (blobs, index.json etc.)
          mkdir -p hcu-package
          tar -xf oci-image.tar -C hcu-package
          
          # Kopiert das HCU-Manifest direkt mit auf die flache Root-Ebene
          cp manifest.json hcu-package/

      - name: Create Valid HCU Plugin TAR.GZ Bundle
        run: |
          # Wechselt in den Paketordner und packt alle OCI-Bestandteile direkt ohne Unterordner
          cd hcu-package
          tar -czf ../hcu-tibber-plugin.tar.gz . *

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ./hcu-tibber-plugin.tar.gz --clobber