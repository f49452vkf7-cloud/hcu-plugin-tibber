name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (Required for ARM64 Emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export Valid ARM64 OCI Layout
        run: |
          mkdir -p ${{ github.workspace }}/oci-export
          docker buildx build \
            --platform linux/arm64 \
            --output type=oci,dest=${{ github.workspace }}/oci-export/image.tar .

      - name: Structure Flat Package Bundle
        run: |
          mkdir -p ${{ github.workspace }}/hcu-package
          tar -xf ${{ github.workspace }}/oci-export/image.tar -C ${{ github.workspace }}/hcu-package
          cp manifest.json ${{ github.workspace }}/hcu-package/

      - name: Create Spec-Compliant HCU TAR.GZ Bundle
        run: |
          # Erzeugt das Archiv absolut im Hauptverzeichnis des Workspaces
          tar --format=posix -czf ${{ github.workspace }}/hcu-tibber-plugin.tar.gz -C ${{ github.workspace }}/hcu-package .

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Nutzt den identischen absoluten Pfad, um Suchfehler auszuschließen
          gh release upload ${{ github.event.release.tag_name }} ${{ github.workspace }}/hcu-tibber-plugin.tar.gz --clobber
