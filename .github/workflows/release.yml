name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (Required for ARM64 Emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export Valid ARM64 OCI Layout
        run: |
          # Erstellt den OCI-Export ordnungsgemäß für die ARM64-Architektur der HCU
          docker buildx build \
            --platform linux/arm64 \
            --output type=oci,dest=./oci-image.tar .

      - name: Structure Flat Package Bundle
        run: |
          # Erstellt ein temporäres Verzeichnis und entpackt die OCI-Struktur
          mkdir -p hcu-package
          tar -xf oci-image.tar -C hcu-package
          
          # Platziert das HCU-Manifest direkt auf die flache Root-Ebene
          cp manifest.json hcu-package/

      - name: Create Valid HCU Plugin TAR.GZ Bundle
        run: |
          # Packt den Inhalt flach (ohne Unterordner) in das finale Archiv
          cd hcu-package
          tar -czf ../hcu-tibber-plugin.tar.gz .

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ./hcu-tibber-plugin.tar.gz --clobber