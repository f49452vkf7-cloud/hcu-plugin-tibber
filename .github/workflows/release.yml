name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export OCI Container Directory
        run: |
          # Baut den Container und exportiert ihn als echtes, entpacktes OCI-Verzeichnis
          docker buildx build --output type=oci,dest=./oci-export .

      - name: Prepare Flat HCU Package Structure
        run: |
          # Verschiebt das Manifest direkt in das OCI-Exportverzeichnis für ein flaches Root-Archiv
          cp manifest.json ./oci-export/

      - name: Create Valid HCU Plugin TAR.GZ Bundle
        run: |
          # Wechselt in den Ordner und packt den Inhalt direkt auf Root-Ebene (ohne Unterordner!)
          cd oci-export
          tar -czf ../hcu-tibber-plugin.tar.gz manifest.json *

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ./hcu-tibber-plugin.tar.gz --clobber