name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js (Syntax Check and Preparation)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Clean Workspace for Flat Packaging
        run: |
          # Entfernt versteckte Ordner und temporäre Dateien vor dem Packen
          rm -rf .git .github .gitignore README.md

      - name: Create Spec-Compliant HCU Source TAR.GZ Bundle
        run: |
          # Packt das reine Quellcode-Projekt im POSIX-Format direkt auf Root-Ebene
          tar --format=posix -czf ${{ github.workspace }}/hcu-tibber-plugin.tar.gz .

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ github.workspace }}/hcu-tibber-plugin.tar.gz --clobber
