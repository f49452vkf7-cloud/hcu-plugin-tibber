name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Production Dependencies
        run: |
          npm ci --only=production

      - name: Create Valid HCU Source TAR.GZ Bundle
        run: |
          # Packt die reine Ordnerstruktur inklusive node_modules auf Root-Ebene
          tar -czf ./hcu-tibber-plugin.tar.gz manifest.json package.json package-lock.json src/ node_modules/

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ./hcu-tibber-plugin.tar.gz --clobber