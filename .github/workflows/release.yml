name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  # Unterdrückt die Node 20 Deprecation-Warnungen auf dem Node 24 Runner bis zum finalen Herbst-Update
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Clean Workspace for Flat Packaging
        run: |
          # Entfernt CI-Dateien und Dokumentationen vor dem Packen
          rm -rf .git .github .gitignore README.md

      - name: Create Spec-Compliant HCU Source TAR.GZ Bundle
        run: |
          # Schreibt das Archiv in das isolierte /tmp Verzeichnis, um die Lese-Schleife zu verhindern
          tar --format=posix -czf /tmp/hcu-tibber-plugin.tar.gz .
          # Verschiebt das fertige Archiv zurück in den Workspace für den Upload
          mv /tmp/hcu-tibber-plugin.tar.gz ${{ github.workspace }}/hcu-tibber-plugin.tar.gz

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ github.workspace }}/hcu-tibber-plugin.tar.gz --clobber
