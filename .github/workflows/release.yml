name: Build HCU Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Create Spec-Compliant HCU Source TAR.GZ Bundle
        run: |
          tar --format=posix \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            -czf /tmp/custom.tibber.monitor-1.9.8.tar.gz .
          mv /tmp/custom.tibber.monitor-1.9.8.tar.gz ${{ github.workspace }}/custom.tibber.monitor-1.9.8.tar.gz

      - name: Upload Asset to GitHub Release (Via Native GitHub CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ github.workspace }}/custom.tibber.monitor-1.9.8.tar.gz --clobber
